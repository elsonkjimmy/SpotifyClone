// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "33.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 33

        // Use the installed side-by-side NDK version available in this environment.
        ndkVersion = "25.1.8937393"
        
        // Java source/target compatibility for current Android/Firebase toolchains.
        sourceCompatibilityVersion = JavaVersion.VERSION_17
        targetCompatibilityVersion = JavaVersion.VERSION_17
        kotlinVersion = "1.8.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.0")
    }
}

project.ext.set('react-native', [
    versions: [
        firebase: [
            bom: "32.7.1",
        ],
        play: [
            "play-services-auth": "20.7.0",
        ],
    ],
])

allprojects {
    gradle.projectsEvaluated {
        allprojects {
            tasks.withType(JavaCompile) {
                sourceCompatibility = rootProject.ext.sourceCompatibilityVersion
                targetCompatibility = rootProject.ext.targetCompatibilityVersion
            }
            tasks.configureEach {
                if (it.hasProperty("kotlinOptions")) {
                    it.kotlinOptions.jvmTarget = "17"
                }
            }
        }
    }
    repositories {
        google()
        mavenCentral()
    }
}

// Force newer androidx.activity version for PickVisualMedia support
subprojects {
    if (project.name == "react-native-linear-gradient") {
        plugins.withId("com.android.library") {
            extensions.configure("android") { androidExtension ->
                androidExtension.namespace = "com.BV.LinearGradient"
            }
        }
    }

    plugins.withId("com.android.library") {
        if (!android.namespace) {
            def manifestFile = file("src/main/AndroidManifest.xml")
            if (manifestFile.exists()) {
                def manifest = new XmlSlurper(false, false).parse(manifestFile)
                android.namespace = manifest.@package.text()
            }
        }
    }

    afterEvaluate { subproject ->
        if (subproject.hasProperty("android")) {
            subproject.android.compileSdkVersion rootProject.ext.compileSdkVersion
            subproject.android.buildFeatures.buildConfig true
        }
    }

    configurations.all {
        resolutionStrategy {
            force 'androidx.activity:activity:1.8.0'
            force 'androidx.activity:activity-ktx:1.8.0'
            force 'androidx.browser:browser:1.8.0'
        }
    }

    if (project.name == "react-native-firebase_firestore") {
        afterEvaluate {
            dependencies.add("implementation", "com.google.guava:guava:31.1-android")
        }
    }
}
